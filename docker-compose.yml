services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka-learning-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"

  redis:
    image: redis:7-alpine
    container_name: kafka-learning-redis
    ports:
      - "6379:6379"

  order-service:
    build: .
    command: uvicorn services.order_service.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      SERVICE_NAME: order-service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - kafka
      - redis

  inventory-service:
    build: .
    command: uvicorn services.inventory_service.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    environment:
      SERVICE_NAME: inventory-service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - kafka
      - redis

  email-service:
    build: .
    command: uvicorn services.email_service.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    environment:
      SERVICE_NAME: email-service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - kafka
      - redis
