services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-learning-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "5Yr0sFKbTm2a_-DuB1HTPQ"

  redis:
    image: redis:7-alpine
    container_name: kafka-learning-redis
    ports:
      - "6380:6379"

  postgres:
    image: postgres:16-alpine
    container_name: kafka-learning-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: kafka_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  order-service:
    build: .
    restart: unless-stopped
    command: uvicorn services.order_services.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      SERVICE_NAME: order-service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/kafka_learning
    depends_on:
      - kafka
      - redis
      - postgres

  outbox-service:
    build: .
    restart: unless-stopped
    command: uvicorn services.outbox_services.main:app --host 0.0.0.0 --port 8004
    ports:
      - "8004:8004"
    environment:
      SERVICE_NAME: outbox-service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/kafka_learning
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-0.1}
      OUTBOX_REDIS_MAX_EVENTS: ${OUTBOX_REDIS_MAX_EVENTS:-1000}
      OUTBOX_POSTGRES_BATCH_SIZE: ${OUTBOX_POSTGRES_BATCH_SIZE:-100}
    depends_on:
      - kafka
      - redis
      - postgres

  inventory-service:
    build: .
    restart: unless-stopped
    command: uvicorn services.inventory_services.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    environment:
      SERVICE_NAME: inventory-service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/kafka_learning
    depends_on:
      - kafka
      - redis
      - postgres

  email-service:
    build: .
    restart: unless-stopped
    command: uvicorn services.email_services.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    environment:
      SERVICE_NAME: email-service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/kafka_learning
      RESEND_API_KEY: ${RESEND_API_KEY}           # set in .env or shell
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      EMAIL_RATE_LIMIT_PER_SECOND: ${EMAIL_RATE_LIMIT_PER_SECOND:-2}
    depends_on:
      - kafka
      - redis
      - postgres

  # ── CQRS query service (read model) ─────────────────────────────────────────

  query-service:
    build: .
    restart: unless-stopped
    command: uvicorn services.query_services.main:app --host 0.0.0.0 --port 8005
    ports:
      - "8005:8005"
    environment:
      SERVICE_NAME: query-service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - kafka
      - redis

  # ── Distributed tracing (OpenTelemetry → Jaeger) ───────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: kafka-learning-jaeger
    ports:
      - "16686:16686"

  # ── Consumer lag monitoring (kafka-exporter → Prometheus → Grafana) ───────

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-learning-kafka-exporter
    restart: unless-stopped
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:9092
    depends_on:
      - kafka

  prometheus:
    image: prom/prometheus:latest
    container_name: kafka-learning-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    depends_on:
      - kafka-exporter

  # ── Observability stack for K6 GUI dashboard ──────────────────────────────

  influxdb:
    image: influxdb:1.8
    container_name: kafka-learning-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"

  grafana:
    image: grafana/grafana:latest
    container_name: kafka-learning-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
      - prometheus

volumes:
  postgres-data:
