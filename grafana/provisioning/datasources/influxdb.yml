apiVersion: 1

datasources:
  - name: InfluxDB-K6
    uid: influxdb-k6
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: k6
    isDefault: true
    editable: true
    jsonData:
      version: "InfluxQL"      # must be explicit in Grafana 10+ (default is Flux)
      httpMode: GET
